<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuitarNoteTrainer - String Pairs</title>
    <style>
        :root { --accent: #00ffcc; --bg: #121212; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; }
        
        /* Lesson Box */
        .lesson-header { background: var(--panel); border: 2px solid #333; border-top: 6px solid var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: left; }
        .lesson-header h2 { color: var(--accent); margin: 0; }
        .step-indicator { color: #888; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; display: block; }
        .tip-text { background: rgba(0, 255, 204, 0.1); padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 4px solid var(--accent); }

        /* Fretboard */
        .fretboard-wrap { overflow-x: auto; background: #000; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .fret-nums { display: flex; margin-left: 45px; color: #666; font-size: 0.8rem; margin-bottom: 5px; }
        .fretboard { display: inline-flex; flex-direction: column; background: #2d1b0e; padding: 10px; border: 2px solid #444; }
        .string { display: flex; position: relative; height: 42px; }
        .string::after { content: ""; position: absolute; width: 100%; height: 2px; background: #888; top: 50%; z-index: 1; }
        .fret { width: 60px; border-right: 3px solid #777; display: flex; align-items: center; justify-content: center; z-index: 2; cursor: pointer; }
        .nut { border-right: 10px solid #fff; width: 35px; background: #000; }
        
        /* Note Bubbles */
        .note { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; z-index: 10; }
        .highlight { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); border: 2px solid #fff; }
        .correct { background: #fff; color: #000; }
        .wrong { background: #ff4d4d; color: #fff; }

        /* Buttons */
        .btn-panel { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        button { padding: 15px 30px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .primary-btn { background: var(--accent); color: #000; }
        .test-btn { background: #fff; color: #000; display: none; }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="lesson-header">
        <span class="step-indicator" id="step-count">Lesson 1 of 3</span>
        <h2 id="l-title">The Mirror Strings (E)</h2>
        <div class="tip-text" id="l-text">The thickest string (6) and thinnest (1) are both E strings. They look exactly the same.</div>
        <p id="l-subtext">Click "Show Pattern" to see the E notes on these two strings.</p>
    </div>

    <div class="fretboard-wrap">
        <div class="fret-nums" id="nums"></div>
        <div class="fretboard" id="board"></div>
    </div>

    <div class="btn-panel">
        <button id="showBtn" class="primary-btn" onclick="showPattern()">Show Pattern</button>
        <button id="testBtn" class="test-btn" onclick="startTest()">I Remember - Test Me</button>
        <button id="nextBtn" class="primary-btn" style="display:none;" onclick="nextStep()">Mastered! Next Pair</button>
    </div>
    
    <div id="msg" style="margin-top: 15px; font-weight: bold; color: var(--accent);"></div>
</div>

<script>
    const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const STRINGS = [4, 11, 7, 2, 9, 4]; // E B G D A E
    
    const STEPS = [
        {
            title: "The Mirror Strings (6 & 1)",
            text: "Strings 6 and 1 are both E. Whatever happens on the thick string happens on the thin string.",
            strings: [0, 5], // High E and Low E
            note: "E"
        },
        {
            title: "The Octave Jump (4 & 2)",
            text: "On strings 4 and 2, the E notes are always 3 frets apart. Look at Fret 2 and Fret 5.",
            strings: [2, 4], // D and B strings
            note: "E"
        },
        {
            title: "The Power Shape (5 & 3)",
            text: "On strings 5 and 3, the E notes are 2 frets apart. Check Fret 7 and Fret 9.",
            strings: [1, 3], // A and G strings
            note: "E"
        }
    ];

    let currentStep = 0;
    let mode = "idle"; // idle, showing, testing
    let score = 0;

    function render(showHighlights = false) {
        const board = document.getElementById('board');
        const numBar = document.getElementById('nums');
        const step = STEPS[currentStep];
        
        board.innerHTML = '';
        numBar.innerHTML = '<div style="width:35px">Nut</div>';
        
        STRINGS.forEach((root, sIdx) => {
            const row = document.createElement('div');
            row.className = 'string';
            
            // Dim strings not in the current lesson
            if (!step.strings.includes(sIdx)) row.style.opacity = "0.2";

            for (let fIdx = 0; fIdx <= 12; fIdx++) {
                const fret = document.createElement('div');
                fret.className = 'fret' + (fIdx === 0 ? ' nut' : '');
                fret.onclick = () => handleFretClick(sIdx, fIdx);

                const noteName = NOTES[(root + fIdx) % 12];
                if (showHighlights && step.strings.includes(sIdx) && noteName === step.note) {
                    fret.innerHTML = `<div class="note highlight">${noteName}</div>`;
                }
                
                row.appendChild(fret);
                if (sIdx === 0) numBar.innerHTML += `<div style="width:60px">${fIdx}</div>`;
            }
            board.appendChild(row);
        });
    }

    function showPattern() {
        mode = "showing";
        render(true);
        document.getElementById('showBtn').style.display = 'none';
        document.getElementById('testBtn').style.display = 'block';
        document.getElementById('msg').innerText = "Study the position of the E notes on these two strings.";
    }

    function startTest() {
        mode = "testing";
        score = 0;
        render(false);
        document.getElementById('testBtn').style.display = 'none';
        document.getElementById('msg').innerText = "Find all E notes on the active (bright) strings!";
    }

    function handleFretClick(sIdx, fIdx) {
        if (mode !== "testing") return;
        const step = STEPS[currentStep];
        if (!step.strings.includes(sIdx)) return;

        const clicked = NOTES[(STRINGS[sIdx] + fIdx) % 12];
        const fretEl = document.getElementById('board').children[sIdx].children[fIdx];

        if (clicked === step.note) {
            if (!fretEl.querySelector('.note')) {
                score++;
                fretEl.innerHTML = `<div class="note correct">${clicked}</div>`;
                if (score >= 4) { // 2 notes per string (Open and 12th usually)
                    document.getElementById('msg').innerText = "✅ Perfect! You've mastered this pair.";
                    document.getElementById('nextBtn').style.display = 'block';
                }
            }
        } else {
            const n = document.createElement('div');
            n.
