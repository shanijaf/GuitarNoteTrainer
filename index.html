<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuitarNoteTrainer - Audio Mastery</title>
    <style>
        :root { --accent: #00ffcc; --bg: #0f172a; --panel: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 950px; margin: auto; }
        
        /* Lesson Header */
        .lesson-header { background: var(--panel); border: 2px solid #334155; border-top: 6px solid var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: left; }
        .lesson-header h2 { color: var(--accent); margin: 0; }
        .step-indicator { color: #94a3b8; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; display: block; }
        .tip-text { background: rgba(0, 255, 204, 0.05); padding: 12px; border-radius: 8px; margin: 15px 0; border-left: 4px solid var(--accent); font-size: 1.1rem; }

        /* Fretboard */
        .fretboard-wrap { overflow-x: auto; background: #000; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .fret-nums { display: flex; margin-left: 45px; color: #475569; font-size: 0.8rem; margin-bottom: 5px; }
        .fretboard { display: inline-flex; flex-direction: column; background: #2d1b0e; padding: 10px; border: 2px solid #444; position: relative; }
        .string { display: flex; position: relative; height: 42px; transition: opacity 0.3s; }
        .string::after { content: ""; position: absolute; width: 100%; height: 2px; background: #94a3b8; top: 50%; z-index: 1; }
        .fret { width: 60px; border-right: 3px solid #71717a; display: flex; align-items: center; justify-content: center; z-index: 2; cursor: pointer; }
        .nut { border-right: 10px solid #f8fafc; width: 35px; background: #000; }
        
        /* Notes */
        .note { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; z-index: 10; animation: pop 0.2s ease-out; }
        .highlight { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); border: 2px solid #fff; }
        .correct { background: #fff; color: #000; box-shadow: 0 0 12px #fff; }
        .wrong { background: #ef4444; color: #fff; }

        /* Navigation */
        .btn-panel { display: flex; justify-content: center; gap: 15px; height: 55px; margin-top: 10px; }
        button { padding: 0 30px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .primary-btn { background: var(--accent); color: #0f172a; }
        .test-btn { background: #fff; color: #0f172a; }
        .next-btn { background: #8b5cf6; color: #fff; animation: pulseGlow 1.5s infinite alternate; }
        
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes pulseGlow { from { box-shadow: 0 0 5px #8b5cf6; transform: scale(1); } to { box-shadow: 0 0 25px #8b5cf6; transform: scale(1.05); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lesson-header">
        <span class="step-indicator" id="step-count">Step 1 of 3</span>
        <h2 id="l-title">The Mirror Strings (6 & 1)</h2>
        <div class="tip-text" id="l-text">Standard tuning mirrors the E on the top and bottom strings.</div>
        <p id="l-subtext" style="color:#94a3b8;">Click 'Show' to study, then 'Test' to prove your mastery.</p>
    </div>

    <div class="fretboard-wrap">
        <div class="fret-nums" id="nums"></div>
        <div class="fretboard" id="board"></div>
    </div>

    <div class="btn-panel">
        <button id="showBtn" class="primary-btn" onclick="showPattern()">1. Show Pattern</button>
        <button id="testBtn" class="test-btn" style="display:none;" onclick="startTest()">2. Test Me</button>
        <button id="nextBtn" class="next-btn" style="display:none;" onclick="nextStep()">3. Pass & Next Lesson →</button>
    </div>
    
    <div id="msg" style="margin-top: 15px; font-weight: bold; font-size: 1.2rem; min-height: 1.5rem; color: var(--accent);"></div>
</div>

<script>
    const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const STRINGS = [4, 11, 7, 2, 9, 4]; // E B G D A E
    
    // Web Audio API for Success Strum
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSuccessStrum() {
        const freqs = [164.81, 220.00, 293.66, 392.00]; // E-A-D-G Strum
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.05));
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + (i * 0.05));
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + (i * 0.05));
            osc.stop(audioCtx.currentTime + 1);
        });
    }

    const STEPS = [
        { title: "The Mirror Strings (6 & 1)", text: "Strings 1 and 6 are twins. Every E note on the bottom is in the same fret on the top.", strings: [0, 5], note: "E", req: 4 },
        { title: "The Octave Jump (4 & 2)", text: "On the D and B strings, the E notes are 3 frets apart (Frets 2 and 5).", strings: [1, 3], note: "E", req: 2 },
        { title: "The Power Pair (5 & 3)", text: "On the A and G strings, the E notes are 2 frets apart (Frets 7 and 9).", strings: [2, 4], note: "E", req: 2 }
    ];

    let currentStep = 0;
    let score = 0;

    function render(showHighlights = false) {
        const board = document.getElementById('board');
        const numBar = document.getElementById('nums');
        const step = STEPS[currentStep];
        board.innerHTML = '';
        numBar.innerHTML = '<div style="width:35px">Nut</div>';
        
        STRINGS.forEach((root, sIdx) => {
            const row = document.createElement('div');
            row.className = 'string';
            if (!step.strings.includes(sIdx)) {
                row.style.opacity = "0.1";
                row.style.pointerEvents = "none";
            }
            for (let fIdx = 0; fIdx <= 12; fIdx++) {
                const fret = document.createElement('div');
                fret.className = 'fret' + (fIdx === 0 ? ' nut' : '');
                fret.onclick = () => handleFretClick(sIdx, fIdx);
                const noteName = NOTES[(root + fIdx) % 12];
                if (showHighlights && step.strings.includes(sIdx) && noteName === step.note) {
                    fret.innerHTML = `<div class="note highlight">${noteName}</div>`;
                }
                row.appendChild(fret);
                if (sIdx === 0) numBar.innerHTML += `<div style="width:60px">${fIdx}</div>`;
            }
            board.appendChild(row);
        });
    }

    function showPattern() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        render(true);
        document.getElementById('showBtn').style.display = 'none';
        document.getElementById('testBtn').style.display = 'block';
        document.getElementById('msg').innerText = "Look at the pattern on the bright strings...";
    }

    function startTest() {
        score = 0;
        render(false);
        document.getElementById('testBtn').style.display = 'none';
        document.getElementById('msg').innerText = "Find the E notes now!";
    }

    function handleFretClick(sIdx, fIdx) {
        const step = STEPS[currentStep];
        const clicked = NOTES[(STRINGS[sIdx] + fIdx) % 12];
        const fretEl = document.getElementById('board').children[sIdx].children[fIdx];

        if (clicked === step.note) {
            if (!fretEl.querySelector('.note')) {
                score++;
                fretEl.innerHTML = `<div class="note correct">${clicked}</div>`;
                if (score >= step.req) {
                    playSuccessStrum();
                    document.getElementById('msg').innerText = "PERFECT! Next lesson unlocked.";
                    document.getElementById('nextBtn').style.display = 'block';
                }
            }
        } else {
            const n = document.createElement('div');
            n.className = 'note wrong';
            n.innerText = clicked;
            fretEl.appendChild(n);
            setTimeout(() => n.remove(), 800);
        }
    }

    function nextStep() {
        currentStep++;
        if (currentStep >= STEPS.length) {
            alert("Mastery Complete! You found every E on the neck.");
            currentStep = 0;
        }
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('showBtn').style.display = 'block';
        document.getElementById('msg').innerText = "";
        const S = STEPS[currentStep];
        document.getElementById('step-count').innerText = `Step ${currentStep + 1} of 3`;
        document.getElementById('l-title').innerText = S.title;
        document.getElementById('l-text').innerText = S.text;
        render(false);
    }

    render(false);
</script>
</body>
</html>
