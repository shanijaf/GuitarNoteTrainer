<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuitarMastery - Step-by-Step</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Progress & Mastery UI */
        .mastery-card { background: #1e293b; padding: 20px; border-radius: 12px; border-bottom: 4px solid #38bdf8; margin-bottom: 20px; text-align: left; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; background: #0f172a; padding: 10px; border-radius: 8px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: #38bdf8; }

        /* Fretboard */
        .fretboard-wrap { overflow-x: auto; background: #27272a; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .fretboard { display: inline-flex; flex-direction: column; background: #3d2b1f; padding: 10px; border: 2px solid #555; }
        .string { display: flex; position: relative; height: 40px; }
        .string::after { content: ""; position: absolute; width: 100%; height: 2px; background: #888; top: 50%; z-index: 1; }
        .fret { width: 60px; border-right: 2px solid #666; display: flex; align-items: center; justify-content: center; z-index: 2; cursor: pointer; }
        .nut { border-right: 8px solid #ddd; width: 35px; }

        /* Notes */
        .note { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .target { background: #38bdf8; color: #0f172a; box-shadow: 0 0 10px #38bdf8; }
        .wrong { background: #ef4444; color: white; }

        /* Controls */
        .btn-nav { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-next { background: #10b981; color: white; }
        .btn-next:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .btn-retry { background: #64748b; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="mastery-card">
        <h2 id="lesson-title">Lesson 1: The E Anchor</h2>
        <p id="lesson-text">Find all the E notes. Reach 90% accuracy to unlock the next lesson.</p>
        
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-label">Accuracy</div><div class="stat-val" id="acc-val">0%</div></div>
            <div class="stat-box"><div class="stat-label">Attempts</div><div class="stat-val" id="att-val">0</div></div>
            <div class="stat-box"><div class="stat-label">Target</div><div class="stat-val" id="target-note">E</div></div>
        </div>
    </div>

    <div class="fretboard-wrap">
        <div class="fretboard" id="board"></div>
    </div>

    <div class="btn-nav">
        <button class="btn-retry" onclick="resetSession()">Restart Lesson</button>
        <button class="btn-next" id="next-btn" onclick="nextLesson()" disabled>Next Lesson (Locked)</button>
    </div>
</div>

<script>
    const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const STRINGS = [4, 11, 7, 2, 9, 4];
    
    const LESSONS = [
        { note: "E", title: "Lesson 1: The E Anchor", text: "Master the E string roots (Open and 12th fret)." },
        { note: "A", title: "Lesson 2: The A String", text: "Find the A notes. Remember: 5th string open is A!" },
        { note: "D", title: "Lesson 3: The D String", text: "Master the D notes in the middle of the neck." },
        { note: "G", title: "Lesson 4: The G String", text: "Final open string anchor. Find all G notes." }
    ];

    let currentIdx = 0;
    let attempts = 0;
    let hits = 0;
    let mastered = false;

    function render() {
        const lesson = LESSONS[currentIdx];
        const board = document.getElementById('board');
        board.innerHTML = '';
        
        document.getElementById('lesson-title').innerText = lesson.title;
        document.getElementById('lesson-text').innerText = lesson.text;
        document.getElementById('target-note').innerText = lesson.note;
        
        STRINGS.forEach((root, sIdx) => {
            const row = document.createElement('div');
            row.className = 'string';
            for (let fIdx = 0; fIdx <= 12; fIdx++) {
                const fret = document.createElement('div');
                fret.className = 'fret' + (fIdx === 0 ? ' nut' : '');
                fret.onclick = () => handleFretClick(sIdx, fIdx);
                row.appendChild(fret);
            }
            board.appendChild(row);
        });
    }

    function handleFretClick(sIdx, fIdx) {
        if (mastered) return;
        
        attempts++;
        const lesson = LESSONS[currentIdx];
        const clickedNote = NOTES[(STRINGS[sIdx] + fIdx) % 12];
        const fretEl = document.getElementById('board').children[sIdx].children[fIdx];

        if (clickedNote === lesson.note) {
            if (!fretEl.querySelector('.note')) {
                hits++;
                const n = document.createElement('div');
                n.className = 'note target';
                n.innerText = clickedNote;
                fretEl.appendChild(n);
            }
        } else {
            const n = document.createElement('div');
            n.className = 'note wrong';
            n.innerText = clickedNote;
            fretEl.appendChild(n);
            setTimeout(() => n.remove(), 800);
        }
        updateStats();
    }

    function updateStats() {
        const accuracy = Math.round((hits / attempts) * 100) || 0;
        document.getElementById('acc-val').innerText = accuracy + "%";
        document.getElementById('att-val').innerText = attempts;

        // Unlock logic: Need at least 5 hits AND > 90% accuracy
        const nextBtn = document.getElementById('next-btn');
        if (accuracy >= 90 && hits >= 5) {
            nextBtn.disabled = false;
            nextBtn.innerText = "Unlock Next Lesson →";
        } else {
            nextBtn.disabled = true;
            nextBtn.innerText = `Need 90% (${accuracy}%)`;
        }
    }

    function resetSession() {
        attempts = 0;
        hits = 0;
        mastered = false;
        updateStats();
        render();
    }

    function nextLesson() {
        currentIdx++;
        if (currentIdx >= LESSONS.length) {
            alert("Course Complete! You are a Fretboard Master.");
            currentIdx = 0;
        }
        resetSession();
    }

    render();
</script>
</body>
</html>
