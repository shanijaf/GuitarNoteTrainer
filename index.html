<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuitarNoteTrainer - Clean Logic Edition</title>
    <style>
        :root { --accent: #00ffcc; --bg: #0f172a; --panel: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1100px; width: 100%; }
        
        /* Fretboard CSS - Procedural rendering */
        .fretboard-wrap { overflow-x: auto; background: #07090e; padding: 50px 10px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .fretboard { display: inline-flex; flex-direction: column; background: #2a1b0d; border: 4px solid #3d2b1f; position: relative; cursor: crosshair; }
        
        .string { display: flex; position: relative; height: 42px; align-items: center; }
        .string::after { content: ""; position: absolute; width: 100%; background: linear-gradient(to bottom, #94a3b8, #64748b, #94a3b8); z-index: 1; pointer-events: none; }
        /* Procedural String Thickness */
        .string[data-s="0"]::after { height: 1px; } .string[data-s="1"]::after { height: 1.5px; } .string[data-s="2"]::after { height: 2px; }
        .string[data-s="3"]::after { height: 3px; } .string[data-s="4"]::after { height: 3.5px; } .string[data-s="5"]::after { height: 4.5px; }

        .fret { width: 75px; height: 100%; border-right: 4px solid #d1d5db; display: flex; align-items: center; justify-content: center; z-index: 2; position: relative; }
        .nut { border-right: 12px solid #f8fafc; width: 40px; }
        
        /* Fret Markers (Dots) - CSS Only */
        .dot { position: absolute; width: 14px; height: 14px; background: rgba(255,255,255,0.15); border-radius: 50%; bottom: -35px; pointer-events: none; }

        /* Notes & Intervals */
        .note { width: 34px; height: 34px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; z-index: 10; transition: 0.1s; }
        .note span { font-size: 0.55rem; opacity: 0.8; } /* For Interval text */
        
        .correct { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }
        .wrong { background: #ff4757; color: #fff; transform: scale(0.8); }
        .shape-node { background: #facc15; color: #000; box-shadow: 0 0 20px #facc15; border: 2px solid #000; }
        .ghost { opacity: 0.4; pointer-events: none; background: var(--accent); color: #000; }

        /* Controls */
        .btn-panel { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; background: var(--panel); padding: 20px; border-radius: 12px; }
        button, select { padding: 12px 20px; border-radius: 8px; border: 1px solid #334155; font-weight: bold; cursor: pointer; background: #0f172a; color: white; }
        button:hover { border-color: var(--accent); }
        .active-btn { background: var(--accent); color: #0f172a; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: left; margin-bottom: 20px;">
        <h2 id="l-title" style="margin:0; color: var(--accent);">Fretboard Mastery</h2>
        <p id="msg" style="margin: 5px 0 0 0; opacity: 0.8;">Choose a module to start practicing.</p>
    </div>

    <div class="fretboard-wrap">
        <div class="fretboard" id="board" onmouseleave="clearGhost()"></div>
    </div>

    <div class="btn-panel">
        <select id="shapeSelect" onchange="setMode('shape', this.value)">
            <option value="">-- Movable Shapes --</option>
            <option value="majorTriad">Major Triad (R-3-5)</option>
            <option value="minorTriad">Minor Triad (R-b3-5)</option>
            <option value="power">Power Chord (R-5-8)</option>
            <option value="dom7">Dominant 7th (R-3-5-b7)</option>
        </select>
        <button id="lessonBtn" onclick="setMode('lesson')">Note Trainer</button>
        <button id="mapBtn" onclick="setMode('map')">Full Map</button>
    </div>
</div>

<script>
    const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const STRINGS = [4, 11, 7, 2, 9, 4]; // E B G D A E
    
    // Shapes defined by {stringOffset, fretOffset, intervalName}
    const SHAPES = {
        majorTriad: [ {s: 0, f: 0, i: 'R'}, {s: 1, f: -1, i: '3'}, {s: 2, f: -2, i: '5'} ],
        minorTriad: [ {s: 0, f: 0, i: 'R'}, {s: 1, f: -2, i: 'b3'}, {s: 2, f: -2, i: '5'} ],
        power: [ {s: 0, f: 0, i: 'R'}, {s: 1, f: 2, i: '5'}, {s: 2, f: 2, i: '8'} ],
        dom7: [ {s: 0, f: 0, i: 'R'}, {s: 1, f: -1, i: '3'}, {s: 2, f: -2, i: 'b7'}, {s: 3, f: -2, i: '5'} ]
    };

    let currentMode = 'lesson';
    let targetNote = "C";
    let activeShape = null;

    function initBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        STRINGS.forEach((root, sIdx) => {
            const row = document.createElement('div');
            row.className = 'string';
            row.dataset.s = sIdx;
            for (let fIdx = 0; fIdx <= 12; fIdx++) {
                const fret = document.createElement('div');
                fret.className = 'fret' + (fIdx === 0 ? ' nut' : '');
                fret.dataset.note = NOTES[(root + fIdx) % 12];
                fret.onmouseenter = () => handleHover(sIdx, fIdx);
                fret.onclick = () => handleClick(sIdx, fIdx, fret);
                
                // Add Dots (3, 5, 7, 9, 12)
                if (sIdx === 5 && [3,5,7,9,12].includes(fIdx)) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    fret.appendChild(dot);
                }
                row.appendChild(fret);
            }
            board.appendChild(row);
        });
    }

    function setMode(mode, val) {
        currentMode = mode;
        activeShape = (mode === 'shape') ? SHAPES[val] : null;
        document.querySelectorAll('.note').forEach(n => n.remove());
        
        if (mode === 'lesson') {
            targetNote = NOTES[Math.floor(Math.random() * NOTES.length)];
            document.getElementById('msg').innerText = `Find all ${targetNote} notes on the neck.`;
        } else if (mode === 'shape') {
            document.getElementById('msg').innerText = "Hover to see the shape, click to lock it.";
        } else {
            document.getElementById('msg').innerText = "Click a note to highlight all occurrences.";
        }
    }

    function handleHover(sIdx, fIdx) {
        if (currentMode !== 'shape' || !activeShape) return;
        clearGhost();
        drawShape(sIdx, fIdx, 'ghost');
    }

    function handleClick(sIdx, fIdx, fretEl) {
        const note = fretEl.dataset.note;

        if (currentMode === 'shape' && activeShape) {
            document.querySelectorAll('.note:not(.ghost)').forEach(n => n.remove());
            drawShape(sIdx, fIdx, 'shape-node');
        } else if (currentMode === 'lesson') {
            if (note === targetNote) {
                fretEl.innerHTML = `<div class="note correct">${note}</div>`;
            } else {
                const err = document.createElement('div');
                err.className = 'note wrong';
                err.innerText = note;
                fretEl.appendChild(err);
                setTimeout(() => err.remove(), 600);
            }
        }
    }

    function drawShape(anchorS, anchorF, className) {
        activeShape.forEach(off => {
            const ts = anchorS - off.s; // Offset 'up' the strings
            const tf = anchorF + off.f;
            if (ts >= 0 && ts < 6 && tf >= 0 && tf <= 12) {
                const targetFret = document.querySelector(`.string[data-s="${ts}"]`).children[tf];
                const noteName = targetFret.dataset.note;
                const node = document.createElement('div');
                node.className = `note ${className}`;
                node.innerHTML = `${noteName}<span>${off.i}</span>`;
                targetFret.appendChild(node);
            }
        });
    }

    function clearGhost() {
        document.querySelectorAll('.ghost').forEach(g => g.remove());
    }

    initBoard();
    setMode('lesson');
</script>
</body>
</html>
