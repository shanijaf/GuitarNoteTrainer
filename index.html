<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fretboard Master Pro + Quiz</title>
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0f1a; --panel: #1e293b; --wood: #2a1b0d;
            /* Note Colors for Heatmap */
            --C: #ff4757; --Cs: #ffa502; --D: #eccc68; --Ds: #2ed573;
            --E: #1e90ff; --F: #3742fa; --Fs: #70a1ff; --G: #747d8c;
            --Gs: #a29bfe; --A: #fd79a8; --As: #fab1a0; --B: #55efc4;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1100px; width: 100%; }

        header { background: var(--panel); padding: 20px; border-radius: 16px; border-top: 4px solid var(--accent); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }

        .stats { text-align: right; }
        .score-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); }

        .fretboard-wrap { overflow-x: auto; background: #05070a; padding: 60px 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 25px; }
        .fretboard { display: inline-flex; flex-direction: column; background: var(--wood); border: 4px solid #3d2b1f; position: relative; }

        .string { display: flex; position: relative; height: 42px; align-items: center; }
        .string::after { content: ""; position: absolute; width: 100%; background: linear-gradient(to bottom, #94a3b8, #cbd5e1, #94a3b8); z-index: 1; pointer-events: none; }
        .string[data-s="0"]::after { height: 1px; } .string[data-s="5"]::after { height: 4.5px; }

        .fret { width: 75px; height: 100%; border-right: 4px solid #d1d5db; display: flex; align-items: center; justify-content: center; z-index: 2; position: relative; cursor: pointer; transition: 0.2s; }
        .nut { border-right: 12px solid #f8fafc; width: 40px; }

        /* Animated Note Styles */
        .note { 
            width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 0.75rem; font-weight: 900; z-index: 10; animation: pop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }
        
        /* Heatmap Colors */
        .note.C { background: var(--C); } .note.Cs { background: var(--Cs); } .note.D { background: var(--D); }
        .note.Ds { background: var(--Ds); } .note.E { background: var(--E); } .note.F { background: var(--F); }
        .note.Fs { background: var(--Fs); } .note.G { background: var(--G); } .note.Gs { background: var(--Gs); }
        .note.A { background: var(--A); } .note.As { background: var(--As); } .note.B { background: var(--B); }

        .correct { background: #fff !important; color: #000; box-shadow: 0 0 20px #fff; }
        .wrong { background: #ff4757; color: #fff; animation: shake 0.4s; }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: var(--panel); padding: 20px; border-radius: 16px; }
        button, select { padding: 12px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .quiz-btn { background: var(--accent); color: #0f172a; border: none; }
        .heatmap-btn { background: #8b5cf6; border: none; }

        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size: 1.2rem; color: var(--accent);">Fretboard Master Pro</h1>
            <p id="msg" style="margin: 5px 0 0 0; color: #94a3b8;">Click 'Start Quiz' to test your speed!</p>
        </div>
        <div class="stats">
            <div style="font-size: 0.7rem; opacity: 0.6;">CURRENT SCORE</div>
            <div id="scoreDisplay" class="score-val">0</div>
        </div>
    </header>

    <div class="fretboard-wrap">
        <div class="fretboard" id="board"></div>
    </div>

    <div class="controls">
        <button class="quiz-btn" onclick="startQuiz()">Start Note Quiz</button>
        <button class="heatmap-btn" onclick="toggleHeatmap()">Toggle Heatmap</button>
        <select id="tuningSelect" onchange="updateTuning(this.value)">
            <option value="standard">Standard Tuning</option>
            <option value="dropD">Drop D Tuning</option>
        </select>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 0.7rem; color: #94a3b8;">CAPO POSITION</label>
            <input type="range" min="0" max="7" value="0" oninput="updateCapo(this.value)">
        </div>
    </div>
</div>

<script>
    const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const TUNINGS = { standard: [4, 11, 7, 2, 9, 4], dropD: [4, 11, 7, 2, 9, 2] };
    
    let currentTuning = TUNINGS.standard;
    let capoPos = 0;
    let score = 0;
    let targetNote = "";
    let isQuizActive = false;
    let isHeatmapActive = false;

    function initBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        currentTuning.forEach((root, sIdx) => {
            const row = document.createElement('div');
            row.className = 'string';
            row.dataset.s = sIdx;
            for (let fIdx = 0; fIdx <= 12; fIdx++) {
                const fret = document.createElement('div');
                const isCapo = (fIdx === capoPos && capoPos !== 0);
                fret.className = 'fret' + (fIdx === 0 ? ' nut' : '') + (isCapo ? ' capo-bar' : '');
                
                // Logic for real note calculation with Capo
                const noteIdx = (root + fIdx + (fIdx === 0 ? capoPos : 0)) % 12;
                fret.dataset.note = NOTES[noteIdx];
                fret.dataset.raw = noteIdx; // For color mapping

                fret.onclick = () => handleFretClick(fret);
                row.appendChild(fret);
            }
            board.appendChild(row);
        });
    }

    function toggleHeatmap() {
        isHeatmapActive = !isHeatmapActive;
        isQuizActive = false;
        renderNotes();
    }

    function renderNotes() {
        document.querySelectorAll('.note').forEach(n => n.remove());
        if (!isHeatmapActive) return;

        document.querySelectorAll('.fret').forEach(f => {
            const noteName = f.dataset.note;
            const noteClass = noteName.replace('#', 's');
            f.innerHTML += `<div class="note ${noteClass}">${noteName}</div>`;
        });
    }

    function startQuiz() {
        isQuizActive = true;
        isHeatmapActive = false;
        score = 0;
        updateScore(0);
        nextQuizTurn();
    }

    function nextQuizTurn() {
        targetNote = NOTES[Math.floor(Math.random() * NOTES.length)];
        document.getElementById('msg').innerText = `QUICK! Find a ${targetNote} note!`;
        document.querySelectorAll('.note').forEach(n => n.remove());
    }

    function handleFretClick(fret) {
        if (!isQuizActive) return;

        if (fret.dataset.note === targetNote) {
            score += 10;
            updateScore(score);
            fret.innerHTML = `<div class="note correct">${targetNote}</div>`;
            setTimeout(nextQuizTurn, 500);
        } else {
            score = Math.max(0, score - 5);
            updateScore(score);
            const err = document.createElement('div');
            err.className = 'note wrong';
            err.innerText = fret.dataset.note;
            fret.appendChild(err);
            setTimeout(() => err.remove(), 600);
        }
    }

    function updateScore(val) {
        document.getElementById('scoreDisplay').innerText = val;
    }

    function updateTuning(v) { currentTuning = TUNINGS[v]; initBoard(); }
    function updateCapo(v) { capoPos = parseInt(v); initBoard(); }

    initBoard();
</script>
</body>
</html>
