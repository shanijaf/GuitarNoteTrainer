<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fretboard: Interval Master</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Interval Legend */
        .legend { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tag { padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .r-tag { background: #ff4757; color: white; } /* Root */
        .m3-tag { background: #2ed573; color: white; } /* Major 3rd */
        .p5-tag { background: #1e90ff; color: white; } /* Perfect 5th */

        .instruction-box { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 4px solid #ff4757; text-align: left; }
        
        .fretboard-wrap { overflow-x: auto; background: #222; padding: 20px; border-radius: 10px; box-shadow: inset 0 0 20px #000; }
        .fretboard { display: inline-flex; flex-direction: column; background: #3d2b1f; padding: 10px; border: 2px solid #555; border-radius: 4px; }
        .string { display: flex; position: relative; height: 45px; }
        .string::after { content: ""; position: absolute; width: 100%; height: 2px; background: #888; top: 50%; z-index: 1; }
        .fret { width: 65px; border-right: 2px solid #666; display: flex; align-items: center; justify-content: center; z-index: 2; cursor: pointer; }
        .nut { border-right: 10px solid #ddd; width: 40px; }

        /* Interval Circles */
        .note { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; border: 2px solid rgba(0,0,0,0.2); }
        .r { background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        .m3 { background: #2ed573; box-shadow: 0 0 10px #2ed573; }
        .p5 { background: #1e90ff; box-shadow: 0 0 10px #1e90ff; }

        .btn-group { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: #444; color: white; }
        button.active { background: #ff4757; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="instruction-box">
        <h2 id="lesson-title">Interval Mode: The Major Triad</h2>
        <p id="lesson-text">Instead of note names, we are looking at <b>Intervals</b>. This pattern builds a Major Chord. Move the Root to change the key!</p>
        <div class="legend">
            <span class="tag r-tag">1 (Root)</span>
            <span class="tag m3-tag">3 (Major 3rd)</span>
            <span class="tag p5-tag">5 (Perfect 5th)</span>
        </div>
    </div>

    <div class="fretboard-wrap">
        <div class="fretboard" id="board"></div>
    </div>

    <div class="btn-group">
        <button onclick="changeKey(-1)">Key Down</button>
        <button class="active" id="key-display">Key: C</button>
        <button onclick="changeKey(1)">Key Up</button>
    </div>
    <p style="color: #888; margin-top: 15px;">Notice how the <b>shape</b> stays the same no matter what key you are in!</p>
</div>

<script>

    const STRINGS = [4, 11, 7, 2, 9, 4]; // E B G D A E
